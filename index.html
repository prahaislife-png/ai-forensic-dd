<!DOCTYPE html>
<html>
<head>
  <title>AI Forensic DD</title>
  <style>
    body{
      font-family: Arial;
      max-width:700px;
      margin:auto;
      padding:40px;
    }
    textarea{
      width:100%;
      height:120px;
      padding:10px;
    }
    button{
      padding:12px;
      margin-top:10px;
      background:#1E3A5F;
      color:white;
      border:none;
      cursor:pointer;
    }
    pre{
      background:#f4f4f4;
      padding:15px;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<h2>🔬 AI Forensic DD Tool</h2>

<textarea id="input"
placeholder="Enter company name and country"></textarea>

<button onclick="run()">Run Investigation</button>

<h3>Result</h3>
<pre id="output"></pre>

<script>
async function run(){
  document.getElementById("output").innerText="Searching...";

  const text =
    document.getElementById("input").value;

  const res = await fetch("/api/forensic",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      prompt:
      "Conduct due diligence investigation on "+text
    })
  });

  const data = await res.json();

  document.getElementById("output")
    .innerText=data.result;
}
</script>

</body>
</html>
