<!DOCTYPE html>

<html>
<head>
<title>AI Forensic DD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family:'Inter', Segoe UI, Arial;
background:#f1f5f9;
max-width:1100px;
margin:auto;
padding:40px;
}

h2{
color:#0f172a;
margin-bottom:20px;
}

.formCard{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
margin-bottom:25px;
}

.inputRow{
display:flex;
gap:15px;
margin-bottom:15px;
}

input, textarea{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:14px;
}

textarea{
height:90px;
resize:none;
}

button{
padding:12px 20px;
margin-top:10px;
margin-right:10px;
background:#1E3A5F;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
opacity:0.9;
}

.report{
background:white;
padding:35px;
margin-top:20px;
border-radius:14px;
box-shadow:0 10px 28px rgba(0,0,0,0.07);
}

.header{
border-bottom:3px solid #1E3A5F;
margin-bottom:25px;
padding-bottom:15px;
}

.meta{
font-size:14px;
color:#475569;
margin-top:10px;
}

.caseID{
font-weight:600;
color:#1E3A5F;
margin-top:5px;
}

.risk{
padding:18px;
margin-top:20px;
font-weight:600;
border-left:6px solid;
border-radius:8px;
}

.green{
background:#ecfdf5;
border-color:#059669;
color:#065f46;
}

.yellow{
background:#fffbeb;
border-color:#D97706;
color:#92400e;
}

.red{
background:#fef2f2;
border-color:#DC2626;
color:#991b1b;
}

.section{
margin-top:22px;
padding:20px;
background:#f8fafc;
border-radius:10px;
border:1px solid #e2e8f0;
}

.section h3{
margin-top:0;
color:#1E3A5F;
margin-bottom:10px;
font-size:16px;
}

.footer{
margin-top:35px;
padding-top:12px;
border-top:1px solid #e2e8f0;
font-size:13px;
color:#64748b;
text-align:center;
}

pre{
white-space:pre-wrap;
margin:0;
font-family:inherit;
}
</style>

</head>

<body>

<h2>🔬 Enterprise AI Forensic Due Diligence</h2>

<div class="formCard">

<div class="inputRow">
<input type="text" id="partnerName" placeholder="Partner / Company Name">
<input type="text" id="partnerAddress" placeholder="Registered Address">
</div>

<textarea id="input" placeholder="Country / Additional Details"></textarea>

<br>

<button onclick="run()">Run Investigation</button> <button onclick="downloadPDF()">📄 Download PDF</button>

</div>

<div id="report" class="report" style="display:none">

<div class="header">
<h2>Forensic Due Diligence Report</h2>
<div class="meta" id="meta"></div>
<div class="caseID" id="caseID"></div>
</div>

<div id="riskBox"></div>

<div id="sections"></div>

<div class="footer">
Created by Govind • Enterprise AI Compliance Platform
</div>

</div>

<script>

function generateCaseID(){
return "DD-"+new Date().getFullYear()+"-"+Math.floor(100000+Math.random()*900000);
}

async function run(){

document.getElementById("report").style.display="block";
document.getElementById("sections").innerHTML="Running investigation...";

const name=document.getElementById("partnerName").value;
const address=document.getElementById("partnerAddress").value;
const details=document.getElementById("input").value;

const res=await fetch("/api/forensic",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:
"Create a structured forensic due diligence report for "+name+
". Registered Address: "+address+
". Details: "+details+
". Use clearly labeled sections: Company Overview, Ownership & Management, Address Verification, Media & Reputation, Legal & Regulatory Issues, Sanctions Screening, Risk Conclusion. End clearly with FLAG: GREEN or FLAG: YELLOW or FLAG: RED."
})
});

const data=await res.json();
const text=data.result || "";

buildReport(name,address,text);
}

function buildReport(name,address,text){

const today=new Date().toLocaleDateString();
const caseID=generateCaseID();

document.getElementById("meta").innerHTML=
"<b>Partner:</b> "+name+
"<br><b>Address:</b> "+address+
"<br><b>Date:</b> "+today+
"<br><b>Screening Type:</b> AI Public Source Due Diligence";

document.getElementById("caseID").innerText="Case ID: "+caseID;

let riskClass="green";
let label="LOW RISK";

if(text.includes("FLAG: RED")){
riskClass="red";
label="HIGH RISK";
}
else if(text.includes("FLAG: YELLOW")){
riskClass="yellow";
label="MEDIUM RISK";
}

document.getElementById("riskBox").innerHTML=
'<div class="risk '+riskClass+'">'+
'Executive Risk Assessment: '+label+
'</div>';

const sectionTitles=[
"Company Overview",
"Ownership & Management",
"Address Verification",
"Media & Reputation",
"Legal & Regulatory Issues",
"Sanctions Screening",
"Risk Conclusion"
];

let html="";

sectionTitles.forEach(title=>{

let content="Information not clearly provided.";

const regex=new RegExp(title+"([\\s\\S]*?)(?="+sectionTitles.join("|")+"|FLAG:|$)","i");
const match=text.match(regex);

if(match && match[1]){
content=match[1].trim();
}

html+=
'<div class="section">'+
'<h3>'+title+'</h3>'+
'<pre>'+content+'</pre>'+

'</div>';

});

document.getElementById("sections").innerHTML=html;
}

function downloadPDF(){
const element=document.getElementById("report");
html2pdf().set({
margin:0.5,
filename:'Enterprise_Forensic_DD_Report.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
}).from(element).save();
}

</script>

</body>
</html>
