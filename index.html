<!DOCTYPE html>

<html>
<head>
<title>AI Forensic DD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef2f6;
max-width:950px;
margin:auto;
padding:40px;
}

h2{
color:#1E3A5F;
}

textarea{
width:100%;
height:110px;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
margin-top:12px;
margin-right:10px;
background:#1E3A5F;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.report{
background:white;
padding:30px;
margin-top:25px;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.header{
border-bottom:4px solid #1E3A5F;
margin-bottom:20px;
padding-bottom:12px;
}

.meta{
font-size:14px;
color:#555;
}

.section{
margin-top:22px;
padding:18px;
background:#f9fafb;
border-left:6px solid #cbd5e1;
border-radius:6px;
}

.section h3{
margin-top:0;
color:#1E3A5F;
}

.risk{
padding:15px;
font-weight:bold;
border-left:6px solid;
margin-top:20px;
border-radius:6px;
}

.green{
background:#ecfdf5;
border-color:#059669;
color:#065f46;
}

.yellow{
background:#fffbeb;
border-color:#D97706;
color:#92400e;
}

.red{
background:#fef2f2;
border-color:#DC2626;
color:#991b1b;
}

.footer{
margin-top:35px;
padding-top:10px;
border-top:1px solid #ddd;
font-size:13px;
color:#666;
text-align:center;
}

pre{
white-space:pre-wrap;
margin:0;
}

</style>

</head>

<body>

<h2>🔬 AI Forensic Due Diligence Tool</h2>

<textarea id="input"
placeholder="Enter Company Name and Country"></textarea>

<br>

<button onclick="run()">Run Investigation</button> <button onclick="downloadPDF()">📄 Download PDF</button>

<div id="report" class="report" style="display:none">

<div class="header">
<h2>AI Forensic Due Diligence Report</h2>
<div class="meta" id="meta"></div>
</div>

<div id="riskBox"></div>

<div id="sections"></div>

<div class="footer">
Created by Govind • AI Forensic DD Platform
</div>

</div>

<script>

async function run(){

document.getElementById("report").style.display="block";
document.getElementById("sections").innerHTML="Running investigation...";

const company=document.getElementById("input").value;

const res=await fetch("/api/forensic",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:
"Create a structured forensic due diligence report for "+company+
" using sections: Company Overview, Ownership & Management, Address Verification, Media & Reputation, Legal & Regulatory Issues, Sanctions Screening, Risk Conclusion. End with FLAG: GREEN or FLAG: YELLOW or FLAG: RED."
})
});

const data=await res.json();
const text=data.result || "";

buildReport(company,text);
}

function buildReport(company,text){

const today=new Date().toLocaleDateString();

document.getElementById("meta").innerHTML=
"<b>Company:</b> "+company+
"<br><b>Date:</b> "+today+
"<br><b>Screening Type:</b> AI Public Source Due Diligence";

let flag="GREEN";
let riskClass="green";
let label="LOW RISK";

if(text.includes("FLAG: RED")){
flag="RED";
riskClass="red";
label="HIGH RISK";
}
else if(text.includes("FLAG: YELLOW")){
flag="YELLOW";
riskClass="yellow";
label="MEDIUM RISK";
}

document.getElementById("riskBox").innerHTML=
'<div class="risk '+riskClass+'">'+
'Overall Risk Assessment: '+label+' ('+flag+')'+
'</div>';

const parts=text.split(/\n(?=[A-Z])/);

let html="";

parts.forEach(p=>{
if(p.trim().length>40){
html+=
'<div class="section"><pre>'+p+'</pre></div>';

}
});

document.getElementById("sections").innerHTML=html;
}

function downloadPDF(){
const element=document.getElementById("report");

html2pdf().set({
margin:0.5,
filename:'AI_Forensic_DD_Report.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
}).from(element).save();
}

</script>

</body>
</html>
