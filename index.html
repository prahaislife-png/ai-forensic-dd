<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Forensic DD</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg: #eef2f7;
  --surface: #ffffff;
  --surface-alt: #f8fafc;
  --primary: #17375e;
  --primary-strong: #102843;
  --accent: #2e5b9f;
  --text: #0f172a;
  --text-muted: #475569;
  --border: #d8e1ec;
  --shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background: linear-gradient(180deg, #f6f9fd 0%, var(--bg) 100%);
  color: var(--text);
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 20px 24px;
}

.topBar {
  background: linear-gradient(110deg, var(--primary-strong) 0%, var(--primary) 60%, #224b82 100%);
  color: #fff;
  border-bottom: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 10px 24px rgba(16, 40, 67, 0.35);
}

.topBarInner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brandMark {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.16);
  display: grid;
  place-items: center;
  font-size: 18px;
}

.brandTitle {
  margin: 0;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.brandSub {
  margin: 2px 0 0;
  font-size: 12px;
  opacity: 0.85;
}

.topBarMeta {
  text-align: right;
}

.projectBy {
  margin: 0 0 8px;
  font-size: 12px;
  font-weight: 500;
  opacity: 0.92;
}

.statusPill {
  font-size: 12px;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.35);
  background: rgba(255, 255, 255, 0.1);
  white-space: nowrap;
}

.heroTitle {
  margin: 20px 0 8px;
  font-size: clamp(1.3rem, 1.9vw, 1.7rem);
  font-weight: 800;
  color: var(--primary-strong);
}

.heroSubtitle {
  margin: 0 0 12px;
  font-size: 0.92rem;
  color: var(--text-muted);
}

.leftColumn {
  display: flex;
  flex-direction: column;
}

.workspaceGrid {
  display: grid;
  grid-template-columns: minmax(0, 7fr) minmax(250px, 3fr);
  gap: 16px;
  align-items: start;
}

.formCard,
.pipelineCard,
.report {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
}

.formCard,
.pipelineCard {
  padding: 20px;
}

.formHeading {
  margin: 0;
  font-size: 1.05rem;
  color: var(--primary-strong);
}

.formDesc {
  margin: 10px 0 14px;
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.45;
}

.inputRow {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

input,
textarea {
  width: 100%;
  height: 42px;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #c6d3e3;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: #fff;
}

input:focus,
textarea:focus {
  outline: 2px solid #bfdbfe;
  border-color: #7aa4da;
}

.buttonRow {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
}

button {
  padding: 11px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-family: inherit;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
}

button:hover:not(:disabled) {
  transform: translateY(-1px);
}

button:active:not(:disabled) {
  transform: translateY(0);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

button.primary {
  border: 1px solid #17375e;
  background: #17375e;
  color: #fff;
  min-width: 190px;
  min-height: 44px;
  font-size: 15px;
  box-shadow: 0 8px 18px rgba(23, 55, 94, 0.3);
}

button.secondary {
  border: 1px solid #9ca3af;
  background: #fff;
  color: #374151;
  min-height: 44px;
}

.progressWrap {
  margin-top: 10px;
  max-width: 320px;
}

.progressBar {
  width: 100%;
  height: 8px;
  border-radius: 999px;
  background: #e2e8f0;
  overflow: hidden;
}

.progressFill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #17375e, #2e5b9f);
  transition: width 0.3s ease;
}

.progressText {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

.noticeCard {
  background: #f8fafc;
  border-left: 4px solid #2563eb;
  padding: 16px;
  border-radius: 8px;
  margin-top: 20px;
  font-size: 14px;
  line-height: 1.6;
  color: #334155;
}

.noticeCard p {
  margin: 0 0 10px;
}

.noticeCard p:last-child {
  margin-bottom: 0;
}

.noticeCard a {
  color: #2563eb;
  font-weight: 600;
  text-decoration: none;
}

.noticeCard a:hover {
  text-decoration: underline;
}

.pipelineTitle {
  margin: 0 0 10px;
  font-size: 1rem;
  color: var(--primary-strong);
}

.pipelineList {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 6px;
}

.pipelineItem {
